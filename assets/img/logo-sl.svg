<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">SL Monogram Logo</title>
  <desc id="logoDesc">Round gold and navy monogram with letters S and L.</desc>
  <defs>
    <linearGradient id="ringGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0d898"/>
      <stop offset="45%" stop-color="#d7b56d"/>
      <stop offset="100%" stop-color="#b98942"/>
    </linearGradient>
    <linearGradient id="fieldNavy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3967"/>
      <stop offset="100%" stop-color="#11264b"/>
    </linearGradient>
  </defs>

  <circle cx="60" cy="60" r="55" fill="url(#ringGold)"/>
  <circle cx="60" cy="60" r="49" fill="#0e1f3f"/>
  <circle cx="60" cy="60" r="46" fill="url(#fieldNavy)"/>

  <text x="44" y="76" text-anchor="middle" fill="#e9cf93" font-size="56" font-family="Georgia, Times New Roman, serif" font-weight="450">S</text>
  <text x="74" y="76" text-anchor="middle" fill="#f5e7c7" font-size="56" font-family="Georgia, Times New Roman, serif" font-weight="450">L</text>

  <circle cx="60" cy="60" r="46" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
</svg>
